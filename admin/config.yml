backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "general"
        label: "General Info"
        file: "_data/settings.json"
        fields:
          - { label: "Restaurant Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Instagram Handle", name: "instagram", widget: "string" }
          - label: "Opening Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Monday–Thursday", name: "mon_thu", widget: "string" }
              - { label: "Friday", name: "fri", widget: "string" }
              - { label: "Saturday", name: "sat", widget: "string" }
              - { label: "Sunday", name: "sun", widget: "string" }

  - name: "menu"
    label: "🍔 Menu Items"
    folder: "_menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Dish Name", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Burgers", "Bowls", "Mains", "Brunch", "Starters & Salads", "Coffee", "Drinks", "Desserts"] }
      - { label: "Price (FCFA)", name: "price", widget: "string" }
      - { label: "Description (FR)", name: "description_fr", widget: "text" }
      - { label: "Description (EN)", name: "description_en", widget: "text" }
      - { label: "Photo", name: "image", widget: "image", required: false }
      - { label: "Badge", name: "badge", widget: "string", required: false }
      - { label: "Active", name: "active", widget: "boolean", default: true }

  - name: "reviews"
    label: "⭐ Customer Reviews"
    folder: "_reviews"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Customer Name", name: "author", widget: "string" }
      - { label: "Review (FR)", name: "text_fr", widget: "text" }
      - { label: "Review (EN)", name: "text_en", widget: "text" }
      - { label: "Rating (1-5)", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
      - { label: "Platform", name: "platform", widget: "string" }
      - { label: "Show on website", name: "active", widget: "boolean", default: true }

  - name: "gallery"
    label: "📸 Photo Gallery"
    folder: "_gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Photo Title", name: "title", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Caption (FR)", name: "caption_fr", widget: "string", required: false }
      - { label: "Caption (EN)", name: "caption_en", widget: "string", required: false }
      - { label: "Show in Instagram section", name: "show_instagram", widget: "boolean", default: true }
